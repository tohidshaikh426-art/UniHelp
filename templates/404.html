{% extends "base.html" %}

{% block title %}404 Not Found - UniHelp{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-gray-300">404</h1>
        <h2 class="text-3xl font-semibold text-gray-900 mt-4">Page Not Found</h2>
        <p class="text-gray-600 mt-2 mb-8">The page you're looking for doesn't exist.</p>
        <a href="{{ url_for('dashboard') }}" 
           class="inline-block bg-primary text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-medium">
            Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
