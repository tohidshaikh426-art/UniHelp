{% extends "base.html" %}

{% block title %}Profile - UniHelp{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow p-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">My Profile</h1>

        <!-- User Info -->
        <div class="space-y-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Name</label>
                    <p class="text-gray-900 font-semibold">{{ user.name }}</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Email</label>
                    <p class="text-gray-900 font-semibold">{{ user.email }}</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Role</label>
                    <span class="px-3 py-1 text-sm font-semibold rounded-full
                        {% if user.role == 'admin' %}bg-red-100 text-red-800
                        {% elif user.role == 'technician' %}bg-green-100 text-green-800
                        {% elif user.role == 'staff' %}bg-blue-100 text-blue-800
                        {% else %}bg-purple-100 text-purple-800{% endif %}">
                        {{ user.role|title }}
                    </span>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Account Status</label>
                    {% if user.isapproved %}
                    <span class="px-3 py-1 text-sm font-semibold rounded-full bg-green-100 text-green-800">
                        Approved
                    </span>
                    {% else %}
                    <span class="px-3 py-1 text-sm font-semibold rounded-full bg-yellow-100 text-yellow-800">
                        Pending Approval
                    </span>
                    {% endif %}
                </div>
            </div>
        </div>

        <!-- Change Password Form -->
        <div class="pt-8 border-t border-gray-200">
            <h2 class="text-xl font-semibold text-gray-900 mb-6">Change Password</h2>
            <form method="POST" action="{{ url_for('profile') }}" class="space-y-6">
                <div>
                    <label for="current_password" class="block text-sm font-medium text-gray-700 mb-2">
                        Current Password
                    </label>
                    <input type="password" id="current_password" name="current_password" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <div>
                    <label for="new_password" class="block text-sm font-medium text-gray-700 mb-2">
                        New Password
                    </label>
                    <input type="password" id="new_password" name="new_password" required minlength="6"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                    <p class="text-sm text-gray-500 mt-2">Minimum 6 characters</p>
                </div>
                <button type="submit" 
                        class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-medium">
                    Update Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
